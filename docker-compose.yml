name: quotegif

services:
  quotegif:
    build:
      context: .
      dockerfile: Dockerfile
    # Load API keys and QUOTEGIF_* settings from .env (optional)
    env_file:
      - path: .env
        required: false
    environment:
      QUOTEGIF_MEDIA_FOLDERS: /media
      QUOTEGIF_OUTPUT_DIR: /output
    volumes:
      - media:/media
      - output:/output
      # Persistent caches: library index + Whisper model weights
      - quotegif-index:/root/.cache/quotegif
      - quotegif-whisper:/root/.cache/huggingface
    stdin_open: true
    tty: true

  # GPU variant — activate with: docker compose --profile gpu run quotegif-gpu find "..."
  # Requires the NVIDIA Container Toolkit on the host.
  quotegif-gpu:
    extends:
      service: quotegif
    profiles:
      - gpu
    environment:
      QUOTEGIF_MEDIA_FOLDERS: /media
      QUOTEGIF_OUTPUT_DIR: /output
      QUOTEGIF_WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  # Edit the 'device' paths below to point to your media and output directories.
  media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /path/to/your/media  # <-- change this
  output:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /path/to/your/output  # <-- change this
  quotegif-index:
    driver: local
  quotegif-whisper:
    driver: local
