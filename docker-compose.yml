name: quotegif

# Host paths are read from .env (gitignored) — never committed.
# Set these two in your .env:
#   QUOTEGIF_HOST_MEDIA=/path/to/your/video/library
#   QUOTEGIF_HOST_OUTPUT=/path/to/where/gifs/are/saved

services:
  quotegif:
    build:
      context: .
      dockerfile: Dockerfile
    # Load API keys and QUOTEGIF_* settings from .env (optional)
    env_file:
      - path: .env
        required: false
    # Inside the container these paths are always fixed — do not change them.
    environment:
      QUOTEGIF_MEDIA_FOLDERS: /media
      QUOTEGIF_OUTPUT_DIR: /output
    volumes:
      - ${QUOTEGIF_HOST_MEDIA:?Set QUOTEGIF_HOST_MEDIA in .env}:/media:ro
      - ${QUOTEGIF_HOST_OUTPUT:?Set QUOTEGIF_HOST_OUTPUT in .env}:/output
      # Persistent caches: library index + Whisper model weights
      - quotegif-index:/root/.cache/quotegif
      - quotegif-whisper:/root/.cache/huggingface
    stdin_open: true
    tty: true

  # GPU variant — activate with: docker compose --profile gpu run quotegif-gpu find "..."
  # Or: ./qg-gpu find "..."
  # Requires the NVIDIA Container Toolkit on the host.
  # Uses Dockerfile.gpu (CUDA runtime) so Whisper can load libcublas on the GPU.
  quotegif-gpu:
    extends:
      service: quotegif
    profiles:
      - gpu
    build:
      context: .
      dockerfile: Dockerfile.gpu
    environment:
      QUOTEGIF_MEDIA_FOLDERS: /media
      QUOTEGIF_OUTPUT_DIR: /output
      QUOTEGIF_WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  quotegif-index:
    driver: local
  quotegif-whisper:
    driver: local
